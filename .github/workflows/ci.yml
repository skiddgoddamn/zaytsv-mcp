name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Syntax check
        run: |
          node --check src/index.mjs
          node --check scripts/smoke.mjs
          node --check skills/build-bot-funnel/validate.mjs
      - name: Smoke test (MCP stdio)
        run: node scripts/smoke.mjs
