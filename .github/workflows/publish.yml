name: Publish to npm

# Публикация по тегу vX.Y.Z. Требует секрет репозитория NPM_TOKEN
# (npm → Access Tokens → Automation/Granular, права publish на пакет).
on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # для npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
      - name: Smoke test
        run: node scripts/smoke.mjs
      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
